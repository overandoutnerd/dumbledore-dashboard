<div class="login-gate login-hidden" id="serverPicker">
    <div class="login-card" style="max-width:420px;">
        <div class="login-emblem"><span data-icon="home" data-size="26"></span></div>
        <h2>Choose a Server</h2>
        <p id="pickerSubtitle">Signed in as <span id="pickerUsername"></span>. Pick a server to manage.</p>
        <div id="serverPickerList" style="text-align:left;"></div>
        <div class="login-error login-hidden" id="pickerError"></div>
        <button class="logout-btn" style="margin-top:14px;font-size:11px;color:var(--parchment-faint);" onclick="logout()">Sign out instead</button>
    </div>
</div>
