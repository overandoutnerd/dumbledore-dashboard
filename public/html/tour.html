<div class="tour-overlay login-hidden" id="tourOverlay">
    <div class="tour-spotlight" id="tourSpotlight"></div>

    <div class="tour-card" id="tourCard">
        <div class="tour-card-head">
            <div class="tour-portrait"><span data-icon="wand" data-size="20"></span></div>
            <div class="tour-speaker">
                <div class="tour-speaker-name">Albus Dumbledore</div>
                <div class="tour-step-label" id="tourStepLabel">Step 1 of 16</div>
            </div>
            <button class="tour-close" id="tourCloseBtn" title="End tour"><span data-icon="close" data-size="14"></span></button>
        </div>
        <div class="tour-body">
            <p class="tour-line" id="tourLine">Ah, hello there.</p>
        </div>
        <div class="tour-dots" id="tourDots"></div>
        <div class="tour-actions">
            <button class="btn btn-ghost btn-sm" id="tourSkipBtn">Skip tour</button>
            <div class="tour-actions-right">
                <button class="btn btn-ghost btn-sm login-hidden" id="tourBackBtn">Back</button>
                <button class="btn btn-primary btn-sm" id="tourNextBtn">Next</button>
            </div>
        </div>
    </div>
</div>
